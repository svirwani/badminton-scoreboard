<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- HEADER: Set Info & Match Score -->
        <header class="header">
            <h1 id="match-status">SET 1</h1>
            <div class="sets-display">
                <span class="set-label">Sets Won</span>
                <div class="set-scores">
                    <span id="p1-sets" class="set-pill">0</span>
                    <span class="set-divider">-</span>
                    <span id="p2-sets" class="set-pill">0</span>
                </div>
            </div>
        </header>

        <!-- MAIN COURT AREA: Scoring Boxes -->
        <main class="court" id="court-layout">
            <!-- Player 1 Box (Left by default) -->
            <div class="player-box" id="p1-box" onclick="scorePoint(1)">
                <!-- Clickable Serve Button -->
                <button class="server-badge" id="p1-badge" onclick="selectServer(1, event)">SERVE</button>
                <input type="text" class="player-name" id="p1-name" value="Player 1" onclick="event.stopPropagation()">
                <div class="score" id="p1-score">0</div>
                <div class="service-court" id="p1-court">Court: Right</div>
            </div>

            <!-- Player 2 Box (Right by default) -->
            <div class="player-box" id="p2-box" onclick="scorePoint(2)">
                <!-- Clickable Serve Button -->
                <button class="server-badge" id="p2-badge" onclick="selectServer(2, event)">SERVE</button>
                <input type="text" class="player-name" id="p2-name" value="Player 2" onclick="event.stopPropagation()">
                <div class="score" id="p2-score">0</div>
                <div class="service-court" id="p2-court">Court: Right</div>
            </div>
        </main>

        <!-- CONTROL PANEL: Actions -->
        <footer class="controls">
            <button class="btn btn-secondary" onclick="undo()">
                Undo
            </button>
            <button class="btn btn-secondary" onclick="swapSides()">
                Swap Sides
            </button>
            <button class="btn btn-danger" onclick="resetMatch()">
                Reset Match
            </button>
        </footer>
    </div>

    <!-- Notification Modal for Set/Match over -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Set Won!</h2>
            <p id="modal-message">Player 1 wins the set.</p>
            <button class="btn btn-primary" onclick="closeModal()">Next Set</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
